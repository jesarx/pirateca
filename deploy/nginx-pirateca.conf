# /etc/nginx/sites-available/pirateca
# El binario de Go sirve todo (HTML, estáticos embebidos y descargas);
# nginx solo hace de reverse proxy y de terminación TLS (con certbot).
server {
    listen 80;
    listen [::]:80;
    server_name pirateca.com www.pirateca.com;

    # Los PDFs que se suben desde el dashboard pueden ser grandes.
    client_max_body_size 600M;

    # Compresión para HTML/CSS/JS/XML (el binario de Go no comprime;
    # nginx lo hace aquí). Los PDFs y JPGs no se recomprimen.
    gzip on;
    gzip_proxied any;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/xml application/json image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Descargas y subidas grandes
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}
