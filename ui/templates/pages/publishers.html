{{define "title"}}Editoriales{{end}}

{{define "main"}}
<section>
  <div class="mb-4 flex flex-col gap-3 border-b border-gray-300 pb-4 md:flex-row md:items-end md:justify-between">
    <h1 class="text-2xl font-bold">Editoriales</h1>

    <form method="GET" action="/publishers" class="flex flex-col gap-2 sm:flex-row sm:items-center">
      <input
        type="search" name="name" value="{{.Search}}" placeholder="Buscar editorial…"
        class="rounded border border-gray-300 bg-white px-3 py-1.5 text-sm focus:border-gray-500 focus:outline-none"
      >
      <select name="sort" onchange="this.form.submit()"
        class="rounded border border-gray-300 bg-white px-2 py-1.5 text-sm">
        {{range .SortOptions}}
        <option value="{{.Value}}" {{if .Selected}}selected{{end}}>{{.Label}}</option>
        {{end}}
      </select>
      <button type="submit" class="rounded bg-gray-900 px-3 py-1.5 text-sm font-semibold text-white hover:bg-gray-700">Buscar</button>
    </form>
  </div>

  {{if .Publishers}}
  <ul class="divide-y divide-gray-200 rounded border border-gray-300 bg-white">
    {{range .Publishers}}
    <li class="flex items-center justify-between gap-4 px-4 py-2.5">
      <a href="/publishers/{{.Slug}}" class="font-semibold hover:text-blue-600 hover:underline">{{.Name}}</a>
      <span class="shrink-0 text-sm text-gray-500">{{.Books}} {{if eq .Books 1}}libro{{else}}libros{{end}}</span>
    </li>
    {{end}}
  </ul>
  {{else}}
  <p class="py-12 text-center text-gray-500">No se encontraron editoriales.</p>
  {{end}}

  {{template "pagination" .}}
</section>
{{end}}
