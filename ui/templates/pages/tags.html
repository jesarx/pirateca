{{define "title"}}Categorías{{end}}

{{define "main"}}
<section class="mx-auto max-w-3xl">
  <h1 class="mb-6 text-2xl font-bold">Categorías</h1>

  {{if .TagCloud}}
  <div class="rounded-2xl border border-gray-200 bg-white px-8 py-12 shadow-sm sm:px-14 sm:py-16">
    <p class="mx-auto flex flex-wrap items-baseline justify-center gap-x-5 gap-y-3 text-center leading-relaxed">
      {{range .TagCloud}}
      <a href="{{.URL}}" title="{{.Tooltip}}"
        class="{{if ge .Pct 66.0}}text-3xl font-semibold text-gray-800{{else if ge .Pct 33.0}}text-2xl font-medium text-gray-700{{else if ge .Pct 12.0}}text-lg text-gray-600{{else}}text-sm text-gray-500{{end}} transition-colors hover:text-brand">
        {{.Label}}<span class="ml-0.5 align-super text-xs font-normal text-gray-400">{{.Value}}</span>
      </a>
      {{end}}
    </p>
  </div>
  <p class="mt-3 text-center text-xs text-gray-500">El tamaño refleja cuántos libros hay en cada categoría.</p>
  {{else}}
  <p class="py-12 text-center text-gray-500">No hay categorías.</p>
  {{end}}
</section>
{{end}}
