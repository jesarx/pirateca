{{define "title"}}Categorías{{end}}

{{define "main"}}
<section>
  <h1 class="mb-4 border-b border-gray-300 pb-4 text-2xl font-bold">Categorías</h1>

  {{if .Tags}}
  <ul class="flex flex-wrap gap-2">
    {{range .Tags}}
    <li>
      <a href="/books?tags={{.Name}}"
        class="inline-block rounded-full border border-gray-300 bg-white px-4 py-1.5 text-sm hover:border-gray-400 hover:text-blue-600">
        {{.Name}} <span class="text-gray-500">({{.Books}})</span>
      </a>
    </li>
    {{end}}
  </ul>
  {{else}}
  <p class="py-12 text-center text-gray-500">No hay categorías.</p>
  {{end}}
</section>
{{end}}
