{{define "nav"}}
<header class="bg-brand shadow-sm">
  <div class="mx-auto flex w-full max-w-6xl flex-wrap items-center gap-x-6 gap-y-2 px-4 py-2.5">
    <a href="/" class="flex items-center gap-2.5">
      <img src="/static/images/logo-libro.png" alt="Pirateca" class="h-10 w-auto drop-shadow-sm">
      <span class="font-mono text-xl font-black lowercase tracking-tighter text-white">pirateca.com</span>
    </a>
    <nav class="flex flex-wrap items-center gap-x-4 gap-y-1 text-sm text-white/85">
      <a href="/books" class="hover:text-white {{if eq .CurrentPath "/books"}}font-bold text-white underline underline-offset-4{{end}}">Libros</a>
      <a href="/authors" class="hover:text-white {{if eq .CurrentPath "/authors"}}font-bold text-white underline underline-offset-4{{end}}">Autores</a>
      <a href="/publishers" class="hover:text-white {{if eq .CurrentPath "/publishers"}}font-bold text-white underline underline-offset-4{{end}}">Editoriales</a>
      <a href="/tags" class="hover:text-white {{if eq .CurrentPath "/tags"}}font-bold text-white underline underline-offset-4{{end}}">Categorías</a>
      <a href="/manifest" class="hover:text-white {{if eq .CurrentPath "/manifest"}}font-bold text-white underline underline-offset-4{{end}}">Manifiesto</a>
      <a href="/contact" class="hover:text-white {{if eq .CurrentPath "/contact"}}font-bold text-white underline underline-offset-4{{end}}">Contacto</a>
    </nav>
    {{if .IsAuthenticated}}
    <nav class="ml-auto flex items-center gap-x-3 text-sm">
      <a href="/dashboard" class="font-semibold text-white hover:underline">Dashboard</a>
      <form method="POST" action="/admin/logout" class="inline">
        <button type="submit" class="cursor-pointer text-white/75 hover:text-white hover:underline">Salir</button>
      </form>
    </nav>
    {{end}}
  </div>
</header>
{{end}}
